version: '3.8'

services:
  # InfluxDB Servisi: Verilerin depolandığı merkez
  influxdb:
    image: influxdb:2.7
    container_name: mesh_influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=admin12345
      - DOCKER_INFLUXDB_INIT_ORG=myorg
      - DOCKER_INFLUXDB_INIT_BUCKET=mesh_data
      # Senin Python kodundaki Token ile birebir aynıdır
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=MWXgxnk2mLeVdn4WDS7y7wQEy1DFM0rME7riNAIljeuMCQbaqz_44jYwWerQTxEmLrf9Po4ttTiDGdffdfKBWw==
    volumes:
      - influxdb-data:/var/lib/influxdb2

  # Grafana Servisi: Verilerin görselleştirildiği panel
  grafana:
    image: grafana/grafana:latest
    container_name: mesh_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - influxdb
    volumes:
      - grafana-data:/var/lib/grafana

volumes:
  influxdb-data:
  grafana-data: